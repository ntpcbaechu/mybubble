<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble HTML 多則動態產生器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f5f7;
      color: #333;
      padding: 20px 10px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    h2 { text-align: center; margin-bottom: 20px; color: #1d1d1f; font-size: 20px; }
    .global-setting {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      background: #f0f0f2;
      padding: 12px;
      border-radius: 8px;
    }
    .global-setting div { flex: 1; }
    label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 4px; }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .item-card {
      border: 2px dashed #dbdbdb;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      position: relative;
      background: #fff;
    }
    .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .item-title { font-weight: bold; font-size: 14px; color: #333; }
    .item-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .item-row div { flex: 1; }
    .btn-delete {
      background-color: #e35050;
      color: white;
      border: none;
      padding: 8px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      margin-top: 5px;
    }
    .btn-add {
      background-color: #6e7681;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
    }
    .btn-submit {
      background-color: #ff8fa3;
      color: white;
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .success-badge {
      display: none;
      text-align: center;
      color: #2da44e;
      font-weight: bold;
      font-size: 13px;
      margin: 10px 0;
    }
    .output-section { margin-top: 20px; }
    .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .btn-copy {
      background: #333;
      color: #fff;
      border: none;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
    }
    #resultCode {
      height: 150px;
      background: #272822;
      color: #f8f8f2;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Bubble HTML 多則動態產生器</h2>
  
  <div class="global-setting">
    <div>
      <label>全域訊息日期</label>
      <input type="text" id="globalDate" value="2026.07.11 토요일" placeholder="例如：2026.07.11 토요일">
    </div>
    <div>
      <label>大頭貼設定</label>
      <select id="globalAvatar">
        <option value="msg-avatar-1">頭像 1 (日常)</option>
        <option value="msg-avatar-2">頭像 2 (更新)</option>
      </select>
    </div>
  </div>

  <div id="itemsContainer"></div>

  <button class="btn-add" onclick="addItem()">➕ 新增一則泡泡規格</button>
  <button class="btn-submit" onclick="generateAllHTML()">🚀 依照順序批次打包完整 HTML</button>
  
  <div class="success-badge" id="successTxt">✅ 成功！已完美串聯畫面上所有訊息！</div>

  <div class="output-section">
    <div class="output-header">
      <label>最終產出 HTML 結果 (全選複製)：</label>
      <button class="btn-copy" onclick="copyCode()">複製</button>
    </div>
    <textarea id="resultCode" readonly placeholder="點擊上方打包按鈕後，完整的代碼會出現在這裡..."></textarea>
  </div>
</div>

<script>
  let itemCount = 0;

  // 自動修正特殊的 .596Z 網址變成標準網址
  function fixStickerUrl(url) {
    if (!url) return '';
    let cleanUrl = url.trim();
    if (cleanUrl.includes('001.596Z')) {
      return 'https://ntpcbaechu.github.io/mybubble/sticker/001.png';
    }
    return cleanUrl;
  }

  // 增加一個新的泡泡輸入區塊
  function addItem() {
    itemCount++;
    const container = document.getElementById('itemsContainer');
    const card = document.createElement('div');
    card.className = 'item-card';
    card.id = `item_${itemCount}`;
    
    card.innerHTML = `
      <div class="item-header">
        <span class="item-title">📦 泡泡項目 #${itemCount}</span>
      </div>
      <div class="item-row">
        <div>
          <label>時間 (例如:20:45)</label>
          <input type="text" class="item-time" placeholder="22:15">
        </div>
        <div>
          <label>類型</label>
          <select class="item-type" onchange="togglePlaceholder(this)">
            <option value="text">💬 純文字訊息</option>
            <option value="image">📸 藝人自拍照大圖</option>
            <option value="sticker">🧸 貼圖網址</option>
            <option value="fan">🗣️ 粉絲訊息 (右側)</option>
            <option value="reply">🔄 藝人回覆粉絲方框</option>
          </select>
        </div>
      </div>
      <div>
        <label class="content-label">內容 (長文換行不會被切開)</label>
        <textarea class="item-content" rows="3" placeholder="請輸入訊息文字..."></textarea>
      </div>
      <button class="btn-delete" onclick="removeItem(${itemCount})">🗑️ 刪除此項目</button>
    `;
    container.appendChild(card);
  }

  function removeItem(id) {
    const el = document.getElementById(`item_${id}`);
    if (el) el.remove();
  }

  function togglePlaceholder(selectEl) {
    const card = selectEl.closest('.item-card');
    const textarea = card.querySelector('.item-content');
    const label = card.querySelector('.content-label');
    
    if (selectEl.value === 'sticker' || selectEl.value === 'image') {
      label.innerText = '圖片/貼圖網址 (會自動幫妳防呆修正格式)';
      textarea.placeholder = 'https://ntpcbaechu.github.io/mybubble/...';
    } else if (selectEl.value === 'reply') {
      label.innerText = '回覆內容 (格式：粉絲的話|藝人的回覆)';
      textarea.placeholder = '例如：回覆測試2-1|回覆測試2-2';
    } else {
      label.innerText = '內容 (長文換行不會被切開)';
      textarea.placeholder = '請輸入訊息文字...';
    }
  }

  // 【核心修正：打包魔法】把畫面上所有泡泡串聯起來，不遺漏任何一則！
  function generateAllHTML() {
    const cards = document.querySelectorAll('.item-card');
    if (cards.length === 0) {
      alert('請至少新增一則泡泡項目再打包喔！');
      return;
    }

    const gDate = document.getElementById('globalDate').value.trim();
    const gAvatar = document.getElementById('globalAvatar').value;
    
    // 開頭先加上整天的日期分隔線
    let finalHTML = `<div class="bubble-date">${gDate}</div>\n`;

    cards.forEach((card, index) => {
      const time = card.querySelector('.item-time').value.trim() || '00:00';
      const type = card.querySelector('.item-type').value;
      let content = card.querySelector('.item-content').value;
      
      // 判斷是不是連續發言（除了第一則以外，如果是藝人發的就加上 msg-continue 隱藏頭像）
      let isContinue = (index > 0 && type !== 'fan') ? ' msg-continue' : '';

      if (type === 'text') {
        const formattedText = content.replace(/\n/g, '<br>');
        finalHTML += `  <div class="msg msg-idol ${gAvatar}${isContinue}">
    <div class="msg-body">
      <div class="msg-wrapper">
        <div class="msg-bubble">${formattedText}</div>
        <span class="msg-time">${time}</span>
      </div>
    </div>
  </div>\n`;
      } 
      else if (type === 'image') {
        let imgUrl = fixStickerUrl(content);
        finalHTML += `  <div class="msg msg-idol ${gAvatar}${isContinue}">
    <div class="msg-body">
      <div class="msg-wrapper">
        <img class="msg-bubble-img" src="${imgUrl}">
        <span class="msg-time">${time}</span>
      </div>
    </div>
  </div>\n`;
      } 
      else if (type === 'sticker') {
        let stkUrl = fixStickerUrl(content);
        finalHTML += `  <div class="msg msg-idol ${gAvatar} msg-sticker${isContinue}">
    <div class="msg-body">
      <div class="msg-wrapper">
        <div class="msg-bubble">
          <img class="msg-bubble-img" src="${stkUrl}">
        </div>
        <span class="msg-time">${time}</span>
      </div>
    </div>
  </div>\n`;
      } 
      else if (type === 'fan') {
        const formattedText = content.replace(/\n/g, '<br>');
        finalHTML += `  <div class="msg msg-fan">
    <div class="msg-body">
      <div class="msg-wrapper">
        <span class="msg-time">${time}</span>
        <div class="msg-bubble">${formattedText}</div>
      </div>
    </div>
  </div>\n`;
      } 
      else if (type === 'reply') {
        let fanPart = "粉絲的訊息";
        let idolPart = "藝人的回覆";
        if (content.includes('|')) {
          const parts = content.split('|');
          fanPart = parts[0].trim();
          idolPart = parts[1].trim().replace(/\n/g, '<br>');
        } else {
          idolPart = content.replace(/\n/g, '<br>');
        }
        finalHTML += `  <div class="msg msg-idol ${gAvatar}${isContinue}">
    <div class="msg-body">
      <div class="msg-wrapper">
        <div class="msg-bubble">
          <div class="msg-reply-box">
            <span class="msg-reply-title">ARTIST의 답장</span>
            <span class="msg-reply-text">${fanPart}</span>
          </div>
          ${idolPart}
        </div>
        <span class="msg-time">${time}</span>
      </div>
    </div>
  </div>\n`;
      }
    });

    document.getElementById('resultCode').value = finalHTML.trim();
    document.getElementById('successTxt').style.display = 'block';
  }

  function copyCode() {
    const copyText = document.getElementById("resultCode");
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(copyText.value);
    alert("代碼已成功複製！可以拿去貼到試算表或備份檔囉！");
  }

  // 預設先給它送上一則初始方框
  addItem();
</script>

</body>
</html>

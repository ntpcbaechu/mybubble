<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble HTML 對話產生器 (完整整合版)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #f5f5f7; padding: 20px 10px; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .item-card { border: 2px dashed #dbdbdb; border-radius: 12px; padding: 15px; margin-bottom: 20px; background: #fff; }
    .item-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .item-row div { flex: 1; }
    label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; }
    .sticker-selected { display: flex; align-items: center; gap: 10px; padding: 8px; border: 1px solid #d2d2d7; border-radius: 8px; cursor: pointer; background: #fff; }
    .sticker-options-box { display: none; border: 1px solid #d2d2d7; max-height: 150px; overflow-y: auto; background: #fff; position: absolute; width: 90%; z-index: 10; }
    .sticker-options-box.show { display: block; }
    .sticker-option { display: flex; align-items: center; padding: 5px; cursor: pointer; }
    .btn-delete { background-color: #e35050; color: white; border: none; padding: 8px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 5px; }
    .btn-add { background-color: #6e7681; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
    .btn-submit { background-color: #ff8fa3; color: white; border: none; padding: 14px; width: 30%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-copy { background-color: #5856d6; color: white; border: none; padding: 14px; width: 30%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-sync { background-color: #28a745; color: white; border: none; padding: 14px; width: 30%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #resultCode { height: 200px; background: #272822; color: #f8f8f2; font-family: monospace; font-size: 12px; margin-top: 10px; width: 100%; }
  </style>
</head>
<body>

<div class="container">
  <h2>Bubble 對話產生器 (完整整合版)</h2>
  <div id="itemsContainer"></div>
  <button class="btn-add" onclick="addItem()">➕ 新增一則泡泡訊息</button>
  
  <div style="display:flex; justify-content:space-between; gap: 5px; margin-top: 10px;">
    <button class="btn-submit" onclick="generateAllHTML()">🚀 打包</button>
    <button class="btn-copy" onclick="copyResult()">📋 複製</button>
    <button class="btn-sync" onclick="syncAllToSheet()">☁️ 同步</button>
  </div>
  
  <textarea id="resultCode" readonly></textarea>
</div>

<script>
  let itemCount = 0;
  const today = new Date().toISOString().split('T')[0];
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_UpICDs7YyDN2-PyZmpomwAeTV1hP-LQrVBY/exec';
  const stickerData = Array.from({length: 10}, (_, i) => ({
    value: `https://ntpcbaechu.github.io/mybubble/sticker/00${i+1}.png`,
    title: `貼圖 00${i+1}`
  }));

  function addItem() {
    itemCount++;
    const card = document.createElement('div');
    card.className = 'item-card';
    card.id = `item_${itemCount}`;
    card.innerHTML = `
      <div class="item-row">
        <div><label>日期</label><input type="date" class="item-date" value="${today}"></div>
        <div><label>時間 (HH:MM)</label><input type="time" class="item-time" value="12:00"></div>
      </div>
      <label>類型</label>
      <select class="item-type" onchange="toggleContent(${itemCount})">
        <option value="text">💬 純文字</option>
        <option value="image">📸 大圖</option>
        <option value="sticker">🧸 貼圖</option>
        <option value="fan">🗣️ 粉絲訊息</option>
        <option value="reply">🔄 藝人回覆</option>
      </select>
      <div class="content-area" style="margin-top:10px;"></div>
      <button class="btn-delete" onclick="document.getElementById('item_${itemCount}').remove()">🗑️ 刪除</button>
    `;
    document.getElementById('itemsContainer').appendChild(card);
    toggleContent(itemCount);
  }

  function toggleContent(id) {
    const card = document.getElementById(`item_${id}`);
    const area = card.querySelector('.content-area');
    const type = card.querySelector('.item-type').value;
    area.innerHTML = (type === 'sticker') ? `
      <div class="sticker-selected" onclick="this.nextElementSibling.classList.toggle('show')">
        <img src="${stickerData[0].value}" style="width:30px"> <span>點擊選擇貼圖</span>
      </div>
      <div class="sticker-options-box">
        ${stickerData.map(s => `<div class="sticker-option" onclick="selectSticker(${id}, '${s.value}', '${s.title}')"><img src="${s.value}" style="width:30px"> ${s.title}</div>`).join('')}
      </div>
      <input type="hidden" class="item-content" value="${stickerData[0].value}">` 
      : `<textarea class="item-content" rows="2" placeholder="輸入內容..."></textarea>`;
  }

  function selectSticker(id, val, title) {
    const card = document.getElementById(`item_${id}`);
    card.querySelector('.sticker-selected span').innerText = title;
    card.querySelector('.item-content').value = val;
    card.querySelector('.sticker-options-box').classList.remove('show');
  }

  function generateAllHTML() {
    let finalHTML = "";
    document.querySelectorAll('.item-card').forEach((card, index) => {
      const d = card.querySelector('.item-date').value;
      const t = card.querySelector('.item-time').value;
      const type = card.querySelector('.item-type').value;
      const content = card.querySelector('.item-content').value;
      let isC = (index > 0 && type !== 'fan') ? ' msg-continue' : '';

      if (type === 'text') finalHTML += `  <div class="msg msg-idol${isC}" data-date="${d}" data-time="${t}"><div class="msg-body"><div class="msg-wrapper"><div class="msg-bubble search-target">${content.replace(/\n/g, '<br>')}</div><span class="msg-time">${t}</span></div></div></div>\n`;
      else if (type === 'image') finalHTML += `  <div class="msg msg-idol${isC}" data-date="${d}" data-time="${t}"><div class="msg-body"><div class="msg-wrapper"><img class="msg-bubble-img" src="${content}"><span class="msg-time">${t}</span></div></div></div>\n`;
      else if (type === 'sticker') finalHTML += `  <div class="msg msg-idol msg-sticker${isC}" data-date="${d}" data-time="${t}"><div class="msg-body"><div class="msg-wrapper"><div class="msg-bubble"><img class="msg-bubble-img" src="${content}"></div><span class="msg-time">${t}</span></div></div></div>\n`;
      else if (type === 'fan') finalHTML += `  <div class="msg msg-fan" data-date="${d}" data-time="${t}"><div class="msg-body"><div class="msg-wrapper"><span class="msg-time">${t}</span><div class="msg-bubble">${content.replace(/\n/g, '<br>')}</div></div></div></div>\n`;
      else if (type === 'reply') {
        const [f, i] = content.split('|');
        finalHTML += `  <div class="msg msg-idol${isC}" data-date="${d}" data-time="${t}"><div class="msg-body"><div class="msg-wrapper"><div class="msg-bubble search-target"><div class="msg-reply-box"><span class="msg-reply-title">ARTIST의 답장</span><span class="msg-reply-text search-target">${f || ''}</span></div>${(i || '').replace(/\n/g, '<br>')}</div><span class="msg-time">${t}</span></div></div></div>\n`;
      }
    });
    document.getElementById('resultCode').value = finalHTML;
    return finalHTML;
  }

  function syncAllToSheet() {
    const finalHTML = generateAllHTML();
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'full_sync',
        time: new Date().toLocaleTimeString(),
        content: '全量同步',
        html: finalHTML,
        timestamp: new Date().toISOString()
      })
    }).then(() => alert('✅ 已成功同步至 Google Sheet！'))
      .catch(e => { console.error(e); alert('❌ 同步失敗'); });
  }

  function copyResult() {
    const code = document.getElementById('resultCode');
    code.select();
    document.execCommand('copy');
    alert('📋 已複製到剪貼簿！');
  }
  
  addItem();
</script>
</body>
</html>
